<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stroke Template Maker</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body class="sigil-maker-page">
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Template Tool</p>
          <h1>Stroke Template Maker</h1>
        </div>
        <div class="status-pill" id="statusPill">Loading</div>
      </header>

      <main class="workspace maker-workspace">
        <section class="canvas-panel maker-canvas-panel">
          <div class="toolbar">
            <button type="button" id="undoButton">Undo</button>
            <button type="button" id="clearButton">Clear</button>
            <button type="button" id="exportButton">Export</button>
            <button type="button" id="copyButton">Copy</button>
          </div>
          <div class="reference-canvas-shell">
            <canvas id="templateCanvas" width="800" height="800"></canvas>
          </div>
        </section>

        <aside class="side-panel">
          <section class="diagnostic-block">
            <h2>Template JSON</h2>
            <textarea id="templateOutput" class="template-output" spellcheck="false"></textarea>
          </section>
          <section class="diagnostic-block">
            <h2>Placement</h2>
            <pre class="diagnostic-output">Paste the exported object into the matching dictionary entry:

src/dictionary/sigils.json
src/dictionary/signs.json
-> strokeTemplate</pre>
          </section>
        </aside>
      </main>
    </div>

    <script type="module" src="./strokeTemplateMaker.js"></script>
  </body>
</html>
